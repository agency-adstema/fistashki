<!doctype html>
<html lang="sr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fistashki — Offline</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #f5f0e8;
      color: #2d2418;
      text-align: center;
      padding: 24px;
    }
    .offline-box {
      max-width: 400px;
    }
    .icon { font-size: 4rem; margin-bottom: 20px; }
    h1 { font-size: 1.8rem; color: #355c2d; margin-bottom: 12px; }
    p { color: #6b5d4f; margin-bottom: 20px; line-height: 1.6; }
    .btn {
      display: inline-block;
      padding: 12px 28px;
      background: #4a7c3f;
      color: #fff;
      font-weight: 700;
      border-radius: 8px;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="offline-box">
    <div class="icon">🥜</div>
    <h1>Trenutno ste offline</h1>
    <p>Nema interneta, ali Fistashki aplikacija je tu! Pokušajte ponovo kad se povežete na mrežu.</p>
    <a href="/" class="btn">Pokušaj ponovo</a>
  </div>
</body>
</html>
